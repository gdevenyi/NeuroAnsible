---

- name: Install software-properties-common for apt-add-repository
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    update_cache: true

- name: add apptainer ppa
  command: apt-add-repository -y -n {{ item }}
  with_items:
    - ppa:apptainer/ppa

- name: Install apptainer dependencies
  ansible.builtin.apt:
    update_cache: true
    state: present
    autoclean: true
    autoremove: true
    pkg:
      - apptainer
